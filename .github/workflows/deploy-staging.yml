name: Deploy Staging

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: docker compose -f docker-compose.staging.yml build
      - name: Deploy
        run: docker compose -f docker-compose.staging.yml up -d
      - name: Cleanup
        run: docker image prune -f
