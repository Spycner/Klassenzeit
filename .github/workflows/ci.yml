name: CI

on:
  pull_request:
  push:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-mise
      - name: Run mise lint pipeline
        run: mise run lint
      - name: Ty (strict, with GitHub annotations)
        run: uv run ty check --output-format github --error-on-warning

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      # Mirrors compose.yaml: postgres 17, klassenzeit/klassenzeit, host
      # port 5433 so backend/.env.test resolves without overrides.
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: klassenzeit
          POSTGRES_PASSWORD: klassenzeit
          POSTGRES_DB: klassenzeit_dev
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U klassenzeit -d klassenzeit_dev"
          --health-interval 2s
          --health-timeout 2s
          --health-retries 15
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-mise
      - name: Run Rust tests
        run: mise run test:rust
      - name: Run Python tests with coverage
        run: |
          uv run pytest -n auto --dist=worksteal --durations=30 \
            --cov=klassenzeit_backend --cov=klassenzeit_solver --cov-report=term \
            | tee /tmp/pytest-cov.txt
      - name: Check Python coverage ratchet
        run: |
          ACTUAL=$(grep '^TOTAL' /tmp/pytest-cov.txt | awk '{print int($NF)}')
          BASELINE=$(cat .coverage-baseline)
          if [ -z "$ACTUAL" ]; then
            echo "::error::Could not extract coverage percentage from pytest output"
            exit 1
          fi
          echo "Coverage: ${ACTUAL}% (baseline: ${BASELINE}%, floor: 80%)"
          if [ "$ACTUAL" -lt 80 ]; then
            echo "::error::Coverage ${ACTUAL}% is below the absolute floor of 80%"
            exit 1
          fi
          if [ "$ACTUAL" -lt "$BASELINE" ]; then
            echo "::error::Coverage ${ACTUAL}% is below the ratchet baseline of ${BASELINE}%. Run 'mise run cov:update-baseline' if this drop is intentional."
            exit 1
          fi
      - name: Check Python test wall-clock budget
        run: |
          # Result line shape: "==== N passed, M warnings in 1215.61s (0:20:15) ===="
          ACTUAL=$(grep -oE 'in [0-9]+\.?[0-9]*s' /tmp/pytest-cov.txt | tail -1 \
                   | grep -oE '[0-9]+\.?[0-9]*' | awk '{print int($1)}')
          BUDGET=$(cat .test-duration-budget)
          if [ -z "$ACTUAL" ]; then
            echo "::error::Could not extract pytest duration from output"
            exit 1
          fi
          echo "Pytest wall-clock: ${ACTUAL}s (budget: ${BUDGET}s)"
          if [ "$ACTUAL" -gt "$BUDGET" ]; then
            echo "::error::Test wall-clock ${ACTUAL}s exceeds the .test-duration-budget of ${BUDGET}s. Investigate or update the budget."
            exit 1
          fi
