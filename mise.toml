# mise.toml — toolchain pins and task definitions

[tools]
rust    = "1.93"
python  = "3.14.2"
uv      = "latest"
node    = "22"
"aqua:pnpm/pnpm"             = "latest"
"cargo:cocogitto"            = "latest"
"ubi:evilmartians/lefthook"  = "latest"
"cargo:cargo-nextest"        = "latest"
"cargo:cargo-llvm-cov"       = "latest"
"cargo:cargo-machete"        = "latest"
"cargo:cargo-deny"           = "latest"

[env]
# Populate as needed (e.g. RUST_BACKTRACE = "1")

# ─── Bootstrap ──────────────────────────────────────────────────────────────

[tasks.install]
description = "Bootstrap dev environment (hooks + deps + rust components)"
depends = ["fe:install"]
run = [
  "lefthook install",
  "rustup component add rustfmt clippy",
  "uv sync",
]

# ─── Dev loop ───────────────────────────────────────────────────────────────

[tasks.dev]
description = "Run the backend with auto-reload"
run = "uv run uvicorn klassenzeit_backend.main:app --reload"

# ─── Testing ────────────────────────────────────────────────────────────────

[tasks.test]
description = "Run all tests (Rust + Python + Frontend)"
depends = ["test:rust", "test:py", "fe:test"]

[tasks."test:rust"]
description = "Run Rust workspace tests (via nextest)"
run = "cargo nextest run --workspace"

[tasks."test:py"]
description = "Run Python tests (backend + solver-py bindings)"
run = "uv run pytest"

[tasks.bench]
description = "Run solver-core benches"
run = "cargo bench -p solver-core"

# ─── Solver rebuild ─────────────────────────────────────────────────────────
# Escape hatch for the maturin rebuild step. Plain `uv sync` picks up Rust
# edits to solver-py, but `maturin develop` is faster on the inner loop.

[tasks."solver:rebuild"]
description = "Rebuild the solver-py extension in place (fast inner-loop alternative to `uv sync`)"
run         = "uvx maturin develop --uv -m solver/solver-py/Cargo.toml"

# ─── Database ───────────────────────────────────────────────────────────────

[tasks."db:up"]
description = "Start the dev Postgres"
run = "podman compose up -d db"

[tasks."db:stop"]
description = "Stop the dev DB (keeps volume)"
run = "podman compose stop db"

[tasks."db:reset"]
description = "Destroy dev DB volume and start fresh (DANGEROUS)"
run = [
  "podman compose rm -sf db",
  # `|| true` — `volume rm` exits non-zero if the volume does not exist,
  # which happens on fresh clones or after a manual volume prune. Swallow
  # that failure so `db:reset` is idempotent.
  "podman volume rm klassenzeit_pgdata || true",
  "podman compose up -d db",
]

[tasks."db:migrate"]
description = "Apply migrations to the dev DB"
dir = "{{config_root}}/backend"
run = "uv run alembic upgrade head"

[tasks."db:revision"]
description = "Autogenerate a new migration (usage: mise run db:revision -- -m 'message')"
dir = "{{config_root}}/backend"
run = "uv run alembic revision --autogenerate"

[tasks."db:downgrade"]
description = "Roll back the last migration"
dir = "{{config_root}}/backend"
run = "uv run alembic downgrade -1"

# ─── Auth ───────────────────────────────────────────────────────────────────

[tasks."auth:create-admin"]
description = "Create an admin user (prompts for password)"
dir = "{{config_root}}/backend"
run = "uv run klassenzeit-backend create-admin"

[tasks."auth:cleanup-sessions"]
description = "Delete expired sessions from the database"
dir = "{{config_root}}/backend"
run = "uv run klassenzeit-backend cleanup-sessions"

# ─── Coverage (separate from `test` — slower, for reports not TDD) ──────────

[tasks.cov]
description = "Run coverage for Rust and Python"
depends = ["cov:rust", "cov:py"]

[tasks."cov:rust"]
run = "cargo llvm-cov --workspace --lcov --output-path target/lcov.info"

[tasks."cov:py"]
run = "uv run pytest --cov=klassenzeit_backend --cov=klassenzeit_solver"

[tasks."cov:update-baseline"]
description = "Run Python coverage and update .coverage-baseline with the new total"
run = """
uv run pytest --cov=klassenzeit_backend --cov=klassenzeit_solver --cov-report=term 2>&1 \
  | grep '^TOTAL' \
  | awk '{print int($NF)}' \
  > .coverage-baseline
echo "Baseline updated to $(cat .coverage-baseline)%"
"""

# ─── Supply-chain audits (run in CI, not pre-push) ──────────────────────────

[tasks.audit]
description = "Supply-chain audits — license, advisory, unused deps"
run = [
  "cargo deny check",
  "uvx pip-audit",
]

# ─── Lint & format ──────────────────────────────────────────────────────────

[tasks.lint]
description = "Run all linters"
depends = ["lint:rust", "lint:py", "fe:lint"]

[tasks."lint:rust"]
run = [
  "cargo fmt --check",
  "cargo clippy --workspace --all-targets -- -D warnings",
  "cargo machete",
]

[tasks."lint:py"]
description = "Lint, format-check, type-check, and dead-code scan Python"
run = [
  "uv run ruff check",
  "uv run ruff format --check",
  "uv run ty check",
  "uv run vulture backend/src",
  "uv run python scripts/check_unique_fns.py",
]

[tasks.fmt]
description = "Auto-format everything"
depends = ["fe:fmt"]
run = [
  "cargo fmt",
  "uv run ruff format",
]

# ─── Frontend ───────────────────────────────────────────────────────────────

# Frontend tasks are wrapped in an existence check so root-level aggregates
# (`install`, `lint`, `test`, `fmt`) keep working on fresh clones before the
# frontend is installed. Once `frontend/package.json` exists, each task delegates
# to pnpm as normal.

[tasks."fe:install"]
description = "Install frontend dependencies"
run = "if [ -f frontend/package.json ]; then pnpm -C frontend install; fi"

[tasks."fe:dev"]
description = "Run the frontend dev server"
dir = "{{config_root}}/frontend"
run = "pnpm dev"

[tasks."fe:build"]
description = "Build the frontend for production"
dir = "{{config_root}}/frontend"
run = "pnpm build"

[tasks."fe:test"]
description = "Run frontend tests"
run = "if [ -f frontend/package.json ]; then pnpm -C frontend test; else echo 'frontend not installed, skipping'; fi"

[tasks."fe:lint"]
description = "Lint the frontend (Biome)"
run = "if [ -f frontend/package.json ]; then pnpm -C frontend lint; else echo 'frontend not installed, skipping'; fi"

[tasks."fe:fmt"]
description = "Format the frontend (Biome)"
run = "if [ -f frontend/package.json ]; then pnpm -C frontend fmt; else echo 'frontend not installed, skipping'; fi"

[tasks."fe:types"]
description = "Regenerate OpenAPI types for the frontend"
run = "bash scripts/gen_frontend_types.sh"
