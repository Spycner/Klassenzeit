# mise.toml — toolchain pins and task definitions

[tools]
rust    = "1.93"
python  = "3.14.2"
uv      = "latest"
node    = "22"
"aqua:pnpm/pnpm"             = "latest"
"cargo:cocogitto"            = "latest"
"ubi:evilmartians/lefthook"  = "1.11.14"
"ubi:rhysd/actionlint"       = "1.7.12"
"cargo:cargo-nextest"        = "latest"
"cargo:cargo-llvm-cov"       = "latest"
"cargo:cargo-machete"        = "latest"
"cargo:cargo-deny"           = "latest"

[env]
# Populate as needed (e.g. RUST_BACKTRACE = "1")

# ─── Bootstrap ──────────────────────────────────────────────────────────────

[tasks.install]
description = "Bootstrap dev environment (hooks + deps + rust components)"
depends = ["fe:install"]
run = [
  "lefthook install",
  "rustup component add rustfmt clippy",
  "uv sync",
]

# ─── Dev loop ───────────────────────────────────────────────────────────────

[tasks.dev]
description = "Run the backend with auto-reload"
run = "uv run uvicorn klassenzeit_backend.main:app --reload"

# ─── Testing ────────────────────────────────────────────────────────────────

[tasks.test]
description = "Run all tests (Rust + Python + Frontend)"
depends = ["test:rust", "test:py", "fe:test"]

[tasks."test:rust"]
description = "Run Rust workspace tests (via nextest)"
run = "cargo nextest run --workspace"

[tasks."test:py"]
description = "Run Python tests (backend + solver-py bindings)"
run = "uv run pytest"

[tasks."test:py:parallel"]
description = "Run Python tests in parallel (mirrors the CI -n auto invocation)"
run = "uv run pytest -n auto"

[tasks.bench]
description = "Run solver-core benches"
run = "cargo bench -p solver-core"

[tasks."bench:record"]
description = "Re-run the solver bench and regenerate solver/solver-core/benches/BASELINE.md"
run         = "./scripts/record_solver_bench.sh"

# ─── Solver rebuild ─────────────────────────────────────────────────────────
# Escape hatch for the maturin rebuild step. Plain `uv sync` picks up Rust
# edits to solver-py, but `maturin develop` is faster on the inner loop.

[tasks."solver:rebuild"]
description = "Rebuild the solver-py extension in place (fast inner-loop alternative to `uv sync`)"
run         = "uvx maturin develop --uv -m solver/solver-py/Cargo.toml"

# ─── Database ───────────────────────────────────────────────────────────────

[tasks."db:up"]
description = "Start the dev Postgres"
run = "podman compose up -d db"

[tasks."db:stop"]
description = "Stop the dev DB (keeps volume)"
run = "podman compose stop db"

[tasks."db:reset"]
description = "Destroy dev DB volume and start fresh (DANGEROUS)"
run = [
  "podman compose rm -sf db",
  # `|| true` — `volume rm` exits non-zero if the volume does not exist,
  # which happens on fresh clones or after a manual volume prune. Swallow
  # that failure so `db:reset` is idempotent.
  "podman volume rm klassenzeit_pgdata || true",
  "podman compose up -d db",
]

[tasks."db:migrate"]
description = "Apply migrations to the dev DB"
dir = "{{config_root}}/backend"
run = "uv run alembic upgrade head"

[tasks."db:revision"]
description = "Autogenerate a new migration (usage: mise run db:revision -- -m 'message')"
dir = "{{config_root}}/backend"
run = "uv run alembic revision --autogenerate"

[tasks."db:downgrade"]
description = "Roll back the last migration"
dir = "{{config_root}}/backend"
run = "uv run alembic downgrade -1"

# ─── Auth ───────────────────────────────────────────────────────────────────

[tasks."auth:create-admin"]
description = "Create an admin user (prompts for password)"
dir = "{{config_root}}/backend"
run = "uv run klassenzeit-backend create-admin"

[tasks."auth:cleanup-sessions"]
description = "Delete expired sessions from the database"
dir = "{{config_root}}/backend"
run = "uv run klassenzeit-backend cleanup-sessions"

[tasks."auth:seed-e2e-admin"]
description = "Idempotently seed the fixed e2e admin user"
dir = "{{config_root}}/backend"
run = "uv run klassenzeit-backend seed-e2e-admin"

[tasks."seed:grundschule"]
description = "Seed a demo Hessen Grundschule (refuses in KZ_ENV=prod)"
dir = "{{config_root}}/backend"
run = "uv run klassenzeit-backend seed-grundschule"

# ─── Coverage (separate from `test` — slower, for reports not TDD) ──────────

[tasks.cov]
description = "Run coverage for Rust and Python"
depends = ["cov:rust", "cov:py"]

[tasks."cov:rust"]
run = "cargo llvm-cov --workspace --lcov --output-path target/lcov.info"

[tasks."cov:py"]
run = "uv run pytest --cov=klassenzeit_backend --cov=klassenzeit_solver"

[tasks."cov:update-baseline"]
description = "Run Python coverage and update .coverage-baseline with the new total"
run = """
uv run pytest --cov=klassenzeit_backend --cov=klassenzeit_solver --cov-report=term 2>&1 \
  | grep '^TOTAL' \
  | awk '{print int($NF)}' \
  > .coverage-baseline
echo "Baseline updated to $(cat .coverage-baseline)%"
"""

# ─── Supply-chain audits (run in CI, not pre-push) ──────────────────────────

[tasks.audit]
description = "Supply-chain audits — license, advisory, unused deps"
run = [
  "cargo deny check",
  "uvx pip-audit",
]

# ─── GitHub repo config ─────────────────────────────────────────────────────

[tasks."repo:apply-settings"]
description = "Apply GitHub repo + branch-protection settings from docs/superpowers/*.json"
run = "bash scripts/apply-github-settings.sh"

# ─── Lint & format ──────────────────────────────────────────────────────────

[tasks.lint]
description = "Run all linters"
depends = ["lint:rust", "lint:py", "fe:lint", "lint:design", "check:commit-types", "check:actions"]

[tasks."gen:commit-types"]
description = "Regenerate commit-types-derived sections in pr-title.yml and CONTRIBUTING.md"
run = "uv run python scripts/gen_commit_types.py --write"

[tasks."check:commit-types"]
description = "Verify pr-title.yml and CONTRIBUTING.md match .github/commit-types.yml"
run = "uv run python scripts/gen_commit_types.py"

[tasks."check:actions"]
description = "Lint GitHub Actions workflows with actionlint"
run = "actionlint"

[tasks."lint:rust"]
run = [
  "cargo fmt --check",
  "cargo clippy --workspace --all-targets -- -D warnings",
  "cargo machete",
]

[tasks."lint:py"]
description = "Lint, format-check, type-check, dead-code scan Python; plus cross-language lint scripts"
run = [
  "uv run ruff check",
  "uv run ruff format --check",
  "uv run ty check",
  "uv run vulture backend/src",
  "uv run python scripts/check_unique_fns.py",
  "uv run python scripts/check_use_effect_sync.py",
]

[tasks."lint:design"]
description = "Lint frontend/DESIGN.md against the @google/design.md format"
run = "if [ -f frontend/node_modules/@google/design.md/package.json ]; then pnpm -C frontend exec design.md lint DESIGN.md; else echo 'frontend deps not installed, skipping'; fi"

[tasks.fmt]
description = "Auto-format everything"
depends = ["fe:fmt"]
run = [
  "cargo fmt",
  "uv run ruff format",
]

# ─── Frontend ───────────────────────────────────────────────────────────────

# Frontend tasks are wrapped in an existence check so root-level aggregates
# (`install`, `lint`, `test`, `fmt`) keep working on fresh clones before the
# frontend is installed. Once `frontend/package.json` exists, each task delegates
# to pnpm as normal.

[tasks."fe:install"]
description = "Install frontend dependencies"
run = "if [ -f frontend/package.json ]; then pnpm -C frontend install; fi"

[tasks."fe:dev"]
description = "Run the frontend dev server"
dir = "{{config_root}}/frontend"
run = "pnpm dev"

[tasks."fe:build"]
description = "Build the frontend for production"
dir = "{{config_root}}/frontend"
run = "pnpm build"

[tasks."fe:preview"]
description = "Serve the built frontend via vite preview on :4173"
dir = "{{config_root}}/frontend"
run = "pnpm exec vite preview --port 4173 --strictPort"

[tasks."fe:test"]
description = "Run frontend tests"
run = "if [ -f frontend/package.json ]; then pnpm -C frontend test; else echo 'frontend not installed, skipping'; fi"

[tasks."fe:test:cov"]
description = "Run frontend tests with coverage (produces frontend/coverage/coverage-summary.json)"
dir = "{{config_root}}/frontend"
run = "pnpm exec vitest run --coverage"

[tasks."fe:cov:update-baseline"]
description = "Update .coverage-baseline-frontend with the current frontend line-coverage total"
run = """
mise run fe:test:cov
ACTUAL=$(node -e "console.log(Math.floor(require('./frontend/coverage/coverage-summary.json').total.lines.pct))")
echo "$ACTUAL" > .coverage-baseline-frontend
echo "Frontend baseline updated to ${ACTUAL}%"
"""

[tasks."fe:lint"]
description = "Lint the frontend (Biome)"
run = "if [ -f frontend/package.json ]; then pnpm -C frontend lint; else echo 'frontend not installed, skipping'; fi"

[tasks."fe:fmt"]
description = "Format the frontend (Biome)"
run = "if [ -f frontend/package.json ]; then pnpm -C frontend fmt; else echo 'frontend not installed, skipping'; fi"

[tasks."fe:types"]
description = "Regenerate OpenAPI types for the frontend"
run = "bash scripts/gen_frontend_types.sh"

# ─── End-to-end (Playwright) ────────────────────────────────────────────────

[tasks."e2e:install"]
description = "One-time Chromium install for Playwright"
dir = "{{config_root}}/frontend"
run = "pnpm exec playwright install chromium"

[tasks.e2e]
description = "Run the Playwright e2e suite (starts DB, migrates, seeds admin, runs tests)"
depends = ["db:up"]
dir = "{{config_root}}/frontend"
env = { KZ_ENV = "test" }
run = [
  "cd ../backend && KZ_DATABASE_URL=postgresql+psycopg://klassenzeit:klassenzeit@localhost:5433/klassenzeit_test uv run alembic upgrade head",
  "cd ../backend && KZ_DATABASE_URL=postgresql+psycopg://klassenzeit:klassenzeit@localhost:5433/klassenzeit_test KZ_ENV=test uv run klassenzeit-backend seed-e2e-admin",
  "pnpm exec playwright test --config e2e/playwright.config.ts",
]

[tasks."e2e:ui"]
description = "Run the Playwright e2e suite in interactive UI mode"
depends = ["db:up"]
dir = "{{config_root}}/frontend"
env = { KZ_ENV = "test" }
run = [
  "cd ../backend && KZ_DATABASE_URL=postgresql+psycopg://klassenzeit:klassenzeit@localhost:5433/klassenzeit_test uv run alembic upgrade head",
  "cd ../backend && KZ_DATABASE_URL=postgresql+psycopg://klassenzeit:klassenzeit@localhost:5433/klassenzeit_test KZ_ENV=test uv run klassenzeit-backend seed-e2e-admin",
  "pnpm exec playwright test --config e2e/playwright.config.ts --ui",
]
